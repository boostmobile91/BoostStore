];

function distance(lat1, lon1, lat2, lon2){
 const R=6371;
 const dLat=(lat2-lat1)*Math.PI/180;
 const dLon=(lon2-lon1)*Math.PI/180;
 const a=Math.sin(dLat/2)**2 +
 Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
 Math.sin(dLon/2)**2;
 return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function findNearest(){
 navigator.geolocation.getCurrentPosition(pos=>{
   const userLat=pos.coords.latitude;
   const userLng=pos.coords.longitude;

   let nearest=stores[0];
   let min=distance(userLat,userLng,nearest.lat,nearest.lng);

   stores.forEach(s=>{
      const d=distance(userLat,userLng,s.lat,s.lng);
      if(d<min){min=d;nearest=s;}
   });

   const url=`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(nearest.address)}`;
   window.location.href=url;
 },err=>alert("Location access is required."));
}
